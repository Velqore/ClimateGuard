<svg xmlns="http://www.w3.org/2000/svg" viewBox="-35 -35 70 70" fill="none">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="boltGrad" x1="0" y1="-14" x2="0" y2="14" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="45%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <!-- Petals -->
  <g transform="rotate(0)"  opacity="0.85"><path d="M0,0 C-10,-10 -11,-20 0,-26 C11,-20 10,-10 0,0 Z" fill="#38bdf8" filter="url(#glow)"/></g>
  <g transform="rotate(72)" opacity="0.85"><path d="M0,0 C-10,-10 -11,-20 0,-26 C11,-20 10,-10 0,0 Z" fill="#818cf8" filter="url(#glow)"/></g>
  <g transform="rotate(144)" opacity="0.85"><path d="M0,0 C-10,-10 -11,-20 0,-26 C11,-20 10,-10 0,0 Z" fill="#c084fc" filter="url(#glow)"/></g>
  <g transform="rotate(216)" opacity="0.85"><path d="M0,0 C-10,-10 -11,-20 0,-26 C11,-20 10,-10 0,0 Z" fill="#60a5fa" filter="url(#glow)"/></g>
  <g transform="rotate(288)" opacity="0.85"><path d="M0,0 C-10,-10 -11,-20 0,-26 C11,-20 10,-10 0,0 Z" fill="#a78bfa" filter="url(#glow)"/></g>
  <!-- Center bolt -->
  <polygon points="2,-13 -3,-1 1,-1 -2,13 4,1 0,1" fill="url(#boltGrad)" filter="url(#glow)"/>
</svg>
